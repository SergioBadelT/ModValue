<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F1116">
    <title>ModVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- JSZip for ZIP export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
        
        :root {
            --accent: #34D399;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }
        
        .mv-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .mod-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .mod-card:active {
            transform: scale(0.985);
        }

        .category-chip {
            transition: all 0.2s ease;
        }
        
        .category-chip.active {
            box-shadow: 0 0 0 1px currentColor;
        }

        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .sheet-hidden {
            transform: translateY(100%);
        }

        .mod-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 6px;
            background: #1E212B;
            border: 1px solid #262A36;
            color: #A7ACBA;
            font-family: 'JetBrains Mono', monospace;
        }

        .section-header {
            font-size: 13px;
            letter-spacing: -.02em;
            color: #8B92A5;
        }

        .mv-input {
            background: #171923;
            border: 1px solid #262A36;
            color: #EDEDF2;
            font-size: 14px;
        }
        
        .mv-input:focus {
            outline: none;
            border-color: #34D399;
            box-shadow: 0 0 0 1px #34D39930;
        }

        .mv-btn {
            transition: all 0.2s ease;
        }

        .mv-btn:active {
            transform: scale(0.96);
        }

        .mod-list {
            scrollbar-width: thin;
        }
    </style>
</head>
<body class="bg-[#0F1116] text-[#EDEDF2]">
    <!-- Header -->
    <div class="sticky top-0 z-50 bg-[#0F1116] border-b border-[#21242E]">
        <div class="max-w-[560px] mx-auto px-4 pt-5 pb-3">
            
            <!-- Top row: Name + Icon -->
            <div class="flex items-center justify-between gap-2">
                <div class="flex-1 min-w-0">
                    <input id="modpack-name" 
                           type="text" 
                           value="Mi Modpack"
                           class="font-display text-[22px] font-bold tracking-[-0.5px] bg-transparent border-none focus:outline-none focus:bg-[#171923] px-2 py-0.5 rounded-lg w-full max-w-full"
                           onchange="saveModpackName()">
                    <p id="header-count" class="text-sm text-[#8B92A5] pl-2 mt-[-1px]">0 mods guardados</p>
                </div>
                
                <div class="flex-shrink-0">
                    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-[#34D39933] to-[#34D39911] border border-[#34D39955] flex items-center justify-center">
                        <i class="fa-solid fa-boxes text-[#34D399] text-xl"></i>
                    </div>
                </div>
            </div>

            <!-- Search + Sort + Download -->
            <div class="flex gap-2 mt-4 items-center">
                <div class="flex-1 relative">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-[#5D6373]"></i>
                    <input id="search-input" 
                           type="text" 
                           placeholder="Buscar en tu lista..."
                           class="mv-input w-full pl-11 pr-4 py-3 rounded-2xl text-sm placeholder:text-[#5D6373]">
                </div>
                
                <!-- Download button (next to search) -->
                <button onclick="showExportModal()" 
                        class="w-11 h-11 flex items-center justify-center bg-[#171923] border border-[#262A36] rounded-2xl text-[#8B92A5] hover:text-white active:bg-[#21242E]">
                    <i class="fa-solid fa-download"></i>
                </button>

                <!-- Delete all mods button -->
                <button onclick="confirmDeleteAll()" 
                        class="w-11 h-11 flex items-center justify-center bg-[#171923] border border-[#262A36] rounded-2xl text-[#8B92A5] hover:text-[#F0554B] hover:border-[#F0554B55] active:bg-[#21242E]">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                
            </div>

            <!-- Category chips -->
            <div id="category-chips" class="flex gap-2 mt-3 overflow-x-auto pb-2 -mx-1 px-1">
                <!-- Populated by JS -->
            </div>

        </div>
    </div>

    <!-- Mods List -->
    <div class="max-w-[560px] mx-auto px-4 pt-4 pb-24">
        <div id="mods-list" class="space-y-2.5">
            <!-- Populated by JS -->
        </div>
        
        <div id="empty-state" class="hidden text-center py-12">
            <div class="mx-auto w-14 h-14 bg-[#171923] rounded-2xl flex items-center justify-center mb-4">
                <i class="fa-solid fa-box-open text-3xl text-[#5D6373]"></i>
            </div>
            <p class="font-medium text-[#8B92A5]">Tu cofre está vacío</p>
            <p class="text-sm text-[#5D6373] mt-1">Añade tu primer mod con el botón +</p>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button onclick="openAddSheet()"
            class="fixed bottom-6 right-5 w-14 h-14 bg-[#34D399] text-[#0F1116] rounded-2xl flex items-center justify-center shadow-xl active:scale-95 z-50">
        <i class="fa-solid fa-plus text-2xl"></i>
    </button>

    <!-- Bottom Sheet -->
    <div id="sheet-backdrop" onclick="closeSheet()" class="hidden fixed inset-0 bg-black/60 z-[60]"></div>
    
    <div id="bottom-sheet" 
         class="hidden fixed bottom-0 left-0 right-0 max-w-[560px] mx-auto bg-[#14161D] border-t border-[#262A36] rounded-t-3xl z-[70] max-h-[92vh] overflow-hidden">
        
        <div class="px-5 pt-4 pb-6">
            <!-- Sheet handle -->
            <div class="w-9 h-1 bg-[#2A2E3A] rounded-full mx-auto mb-4"></div>
            
            <div class="flex items-center justify-between mb-4">
                <h3 id="sheet-title" class="font-display text-xl font-semibold">Añadir mod</h3>
                <button onclick="closeSheet()" class="w-9 h-9 flex items-center justify-center text-[#8B92A5]">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>

            <!-- Tabs -->
            <div id="sheet-tabs" class="flex bg-[#171923] rounded-2xl p-1 mb-5">
                <button onclick="switchSheetTab('manual')" id="tab-manual"
                        class="flex-1 py-2 text-sm font-medium rounded-[14px] bg-[#21242E] text-white">Manual</button>
                <button onclick="switchSheetTab('modrinth')" id="tab-modrinth"
                        class="flex-1 py-2 text-sm font-medium rounded-[14px] text-[#7B8194]">Modrinth</button>
                <button onclick="switchSheetTab('curseforge')" id="tab-curseforge"
                        class="flex-1 py-2 text-sm font-medium rounded-[14px] text-[#7B8194]">CurseForge</button>
            </div>

            <!-- MANUAL TAB -->
            <div id="content-manual">
                <form id="manual-form" onsubmit="submitManualForm(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-[#8B92A5] block mb-1.5">Nombre del mod</label>
                            <input id="form-name" type="text" required class="mv-input w-full rounded-2xl px-4 py-3 text-sm" placeholder="Ej. Sodium">
                        </div>
                        
                        <div>
                            <label class="text-xs text-[#8B92A5] block mb-1.5">Categoría</label>
                            <select id="form-category" class="mv-input w-full rounded-2xl px-4 py-3 text-sm">
                                <!-- populated by JS -->
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs text-[#8B92A5] block mb-1.5">Versión del mod</label>
                                <input id="form-version" type="text" class="mv-input w-full rounded-2xl px-4 py-3 text-sm" placeholder="0.6.0">
                            </div>
                            <div>
                                <label class="text-xs text-[#8B92A5] block mb-1.5">Versión Minecraft</label>
                                <input id="form-mcversion" type="text" class="mv-input w-full rounded-2xl px-4 py-3 text-sm" placeholder="1.21.1">
                            </div>
                        </div>
                        
                        <div>
                            <label class="text-xs text-[#8B92A5] block mb-1.5">Loader</label>
                            <select id="form-loader" class="mv-input w-full rounded-2xl px-4 py-3 text-sm">
                                <option value="Fabric">Fabric</option>
                                <option value="Forge">Forge</option>
                                <option value="Quilt">Quilt</option>
                                <option value="NeoForge">NeoForge</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="text-xs text-[#8B92A5] block mb-1.5">Enlace de descarga</label>
                            <input id="form-link" type="url" required class="mv-input w-full rounded-2xl px-4 py-3 text-sm" placeholder="https://modrinth.com/...">
                        </div>
                        
                        <div>
                            <label class="text-xs text-[#8B92A5] block mb-1.5">Notas (opcional)</label>
                            <textarea id="form-notes" rows="2" class="mv-input w-full rounded-2xl px-4 py-3 text-sm resize-y" placeholder="Dependencias o notas..."></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" 
                            class="mt-5 w-full bg-[#34D399] text-[#0F1116] font-semibold py-3.5 rounded-2xl text-sm active:bg-[#22B27D]">
                        <span id="submit-btn-text">Añadir a la lista</span>
                    </button>
                </form>
            </div>

            <!-- MODRINTH TAB -->
            <div id="content-modrinth" class="hidden">
                <form onsubmit="searchModrinth(event)" class="flex gap-2 mb-4">
                    <input id="mr-query" type="text" placeholder="Buscar en Modrinth (ej. Sodium)" 
                           class="mv-input flex-1 rounded-2xl px-4 py-3 text-sm">
                    <button type="submit" 
                            class="w-12 h-12 flex items-center justify-center bg-[#132B22] text-[#34D399] rounded-2xl border border-[#34D39930]">
                        <i class="fa-solid fa-search"></i>
                    </button>
                </form>
                
                <div id="mr-results" class="space-y-2 max-h-[380px] overflow-auto pr-1">
                    <!-- Results populated by JS -->
                </div>
                
                <div id="mr-error" class="hidden text-sm text-[#E8918A] mt-2"></div>
            </div>

            <!-- CURSEFORGE TAB -->
            <div id="content-curseforge" class="hidden">
                <div class="bg-[#171923] border border-[#21242E] rounded-2xl p-4">
                    <div class="flex gap-3 mb-4">
                        <i class="fa-solid fa-info-circle text-[#F4B740] mt-1"></i>
                        <div>
                            <p class="text-sm text-[#C9CDD6]">
                                CurseForge no permite búsqueda directa desde aquí (requiere API key).
                            </p>
                            <p class="text-xs text-[#7B8194] mt-1">
                                Busca en la web y pega el enlace en la pestaña <strong>Manual</strong>.
                            </p>
                        </div>
                    </div>
                    <button onclick="openCurseForgeSearch()" 
                            class="w-full bg-[#132B22] text-[#34D399] border border-[#34D39930] py-3 rounded-2xl text-sm font-medium">
                        Abrir CurseForge en el navegador
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" onclick="if (event.target.id === 'export-modal') hideExportModal()" class="hidden fixed inset-0 bg-black/70 z-[80] flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#14161D] w-full max-w-[320px] lg:rounded-3xl lg:m-4 rounded-t-3xl border border-[#262A36] p-5 modal">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-lg">Exportar Modpack</h3>
                <button onclick="hideExportModal()" class="text-[#8B92A5] text-xl leading-none">×</button>
            </div>
            
            <div class="space-y-3">
                <button onclick="exportAsTxt(); hideExportModal();" 
                        class="w-full flex items-center gap-3 bg-[#171923] hover:bg-[#21242E] border border-[#262A36] rounded-2xl p-4 text-left">
                    <i class="fa-solid fa-file-alt text-xl text-[#34D399]"></i>
                    <div>
                        <div class="font-medium">Exportar como TXT</div>
                        <div class="text-xs text-[#7B8194]">Lista de mods en texto plano</div>
                    </div>
                </button>
                
                <button onclick="exportAsZip(); hideExportModal();" 
                        class="w-full flex items-center gap-3 bg-[#171923] hover:bg-[#21242E] border border-[#262A36] rounded-2xl p-4 text-left">
                    <i class="fa-solid fa-file-archive text-xl text-[#34D399]"></i>
                    <div>
                        <div class="font-medium">Exportar como ZIP</div>
                        <div class="text-xs text-[#7B8194]">Archivo .zip con los .jar</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind config
        function initTailwind() {
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            'display': ['Space Grotesk', 'Inter', 'system-ui', 'sans-serif']
                        }
                    }
                }
            };
        }

        // Data
        let mods = [];
        let currentFilter = "all";
        let currentSort = "recientes";
        let editingId = null;
        let currentSheetTab = "manual";
        let currentModrinthHit = null; // For version selection
        let debounceTimer = null;

        const CATEGORIES = [
            { key: "tecnologia", label: "Tecnología", color: "#F0554B", icon: "fa-cog" },
            { key: "magia", label: "Magia", color: "#8B7CF6", icon: "fa-magic" },
            { key: "aventura", label: "Aventura", color: "#F4B740", icon: "fa-dragon" },
            { key: "optimizacion", label: "Optimización", color: "#4FD8EA", icon: "fa-gauge-high" },
            { key: "decoracion", label: "Decoración", color: "#C084FC", icon: "fa-palette" },
            { key: "mundo", label: "Mundo", color: "#34D399", icon: "fa-map" },
            { key: "ambientacion", label: "Ambientación", color: "#7DD3FC", icon: "fa-cloud-sun-rain" },
            { key: "utilidad", label: "Utilidad", color: "#9CA8B8", icon: "fa-wrench" },
            { key: "librerias", label: "Librerías", color: "#60A5FA", icon: "fa-link" },
            { key: "otros", label: "Otros", color: "#C87F5A", icon: "fa-boxes" }
        ];

        const LOADERS = ["Fabric", "Forge", "Quilt", "NeoForge", "Otro"];

        function getCategoryInfo(key) {
            return CATEGORIES.find(c => c.key === key) || CATEGORIES.find(c => c.key === "otros");
        }

        // Debounce helper
        function debounce(func, delay = 450) {
            return function(...args) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // Load from localStorage
        function loadMods() {
            const saved = localStorage.getItem("modvault-mods");
            if (saved) {
                mods = JSON.parse(saved);
            }
            updateHeaderCount();
        }

        function saveMods() {
            localStorage.setItem("modvault-mods", JSON.stringify(mods));
            updateHeaderCount();
        }

        function updateHeaderCount() {
            const el = document.getElementById("header-count");
            if (el) el.textContent = `${mods.length} ${mods.length === 1 ? "mod guardado" : "mods guardados"}`;
        }

        // Render category chips
        function renderCategoryChips() {
            const container = document.getElementById("category-chips");
            container.innerHTML = "";

            // All chip
            const allChip = createChip("all", "Todos", mods.length, "#EDEDF2", null, currentFilter === "all");
            container.appendChild(allChip);

            CATEGORIES.forEach(cat => {
                const count = mods.filter(m => m.category === cat.key).length;
                const chip = createChip(cat.key, cat.label, count, cat.color, cat.icon, currentFilter === cat.key);
                container.appendChild(chip);
            });
        }

        function createChip(key, label, count, color, iconClass, active) {
            const btn = document.createElement("button");
            btn.className = `category-chip flex-shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-2xl text-sm border ${active ? "active" : ""}`;
            btn.style.borderColor = active ? color : "#21242E";
            btn.style.background = active ? `${color}15` : "#171923";
            btn.style.color = active ? color : "#8B92A5";

            let html = "";
            if (iconClass) {
                html += `<i class="fa-solid ${iconClass} text-xs"></i>`;
            }
            html += `<span>${label}</span>`;
            html += `<span class="opacity-70 text-xs">${count}</span>`;
            
            btn.innerHTML = html;
            btn.onclick = () => {
                currentFilter = key;
                renderCategoryChips();
                renderModsList();
            };
            return btn;
        }

        // Render mods list
        function renderModsList() {
            const container = document.getElementById("mods-list");
            const empty = document.getElementById("empty-state");
            
            let filtered = [...mods];

            // Filter by category
            if (currentFilter !== "all") {
                filtered = filtered.filter(m => m.category === currentFilter);
            }

            // Search
            const searchTerm = document.getElementById("search-input").value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(searchTerm) || 
                    (m.notes && m.notes.toLowerCase().includes(searchTerm))
                );
            }

            // Sort
            if (currentSort === "nombre") {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else {
                filtered.sort((a, b) => new Date(b.dateAdded || 0) - new Date(a.dateAdded || 0));
            }

            container.innerHTML = "";

            if (filtered.length === 0) {
                empty.classList.remove("hidden");
                return;
            }
            empty.classList.add("hidden");

            filtered.forEach(mod => {
                const cat = getCategoryInfo(mod.category);
                const card = document.createElement("div");
                card.className = `mod-card bg-[#171923] border border-[#21242E] rounded-3xl p-4`;
                card.style.borderLeft = `4px solid ${cat.color}`;

                card.innerHTML = `
                    <div class="flex gap-3">
                        <div class="mod-icon" style="background: linear-gradient(135deg, ${cat.color}33, ${cat.color}11); border: 1px solid ${cat.color}55;">
                            <i class="fa-solid ${cat.icon} text-lg" style="color: ${cat.color}"></i>
                        </div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-semibold text-[15px] leading-tight pr-2">${mod.name}</h3>
                            </div>
                            
                            <p class="text-xs mt-0.5" style="color: ${cat.color}">${cat.label}</p>
                            
                            <div class="flex flex-wrap gap-1.5 mt-2">
                                ${mod.version ? `<span class="tag">v${mod.version}</span>` : ""}
                                ${mod.mcVersion ? `<span class="tag">MC ${mod.mcVersion}</span>` : ""}
                                ${mod.loader ? `<span class="tag">${mod.loader}</span>` : ""}
                            </div>
                            
                            ${mod.notes ? `<p class="text-xs text-[#7B8194] mt-2 line-clamp-2">${mod.notes}</p>` : ""}
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-2 mt-3">
                        ${mod.link ? `
                            <a href="${mod.link}" target="_blank" 
                               class="w-9 h-9 flex items-center justify-center bg-[#132B22] text-[#34D399] rounded-2xl border border-[#34D39930]">
                                <i class="fa-solid fa-external-link-alt text-sm"></i>
                            </a>
                        ` : ""}
                        
                        <button onclick="startEdit('${mod.id}'); event.stopImmediatePropagation();" 
                                class="w-9 h-9 flex items-center justify-center bg-[#1B1E27] text-[#8B92A5] rounded-2xl">
                            <i class="fa-solid fa-edit text-sm"></i>
                        </button>
                        
                        <button onclick="confirmDelete('${mod.id}'); event.stopImmediatePropagation();" 
                                class="w-9 h-9 flex items-center justify-center bg-[#1B1E27] text-[#8B92A5] rounded-2xl">
                            <i class="fa-solid fa-trash text-sm"></i>
                        </button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Search input listener
        function setupSearch() {
            const input = document.getElementById("search-input");
            input.addEventListener("input", () => {
                renderModsList();
            });
        }

        function toggleSort() {
            currentSort = currentSort === "recientes" ? "nombre" : "recientes";
            renderModsList();
        }

        // Bottom sheet functions
        function openAddSheet(tab = "manual") {
            editingId = null;
            document.getElementById("sheet-title").textContent = "Añadir mod";
            document.getElementById("submit-btn-text").textContent = "Añadir a la lista";
            
            // Reset form
            document.getElementById("manual-form").reset();
            document.getElementById("form-category").value = "otros";
            
            showSheet();
            switchSheetTab(tab);
        }

        function showSheet() {
            document.getElementById("sheet-backdrop").classList.remove("hidden");
            document.getElementById("bottom-sheet").classList.remove("hidden");
            document.getElementById("bottom-sheet").classList.add("flex", "flex-col");
        }

        function closeSheet() {
            document.getElementById("sheet-backdrop").classList.add("hidden");
            document.getElementById("bottom-sheet").classList.remove("flex", "flex-col");
            document.getElementById("bottom-sheet").classList.add("hidden");
            
            // Reset editing state
            editingId = null;
            document.getElementById("mr-results").innerHTML = "";
            document.getElementById("mr-error").classList.add("hidden");
        }

        function switchSheetTab(tab) {
            currentSheetTab = tab;
            
            // Hide all content
            document.getElementById("content-manual").classList.add("hidden");
            document.getElementById("content-modrinth").classList.add("hidden");
            document.getElementById("content-curseforge").classList.add("hidden");
            
            // Show selected
            document.getElementById(`content-${tab}`).classList.remove("hidden");
            
            // Update tab styles
            document.getElementById("tab-manual").classList.toggle("bg-[#21242E]", tab === "manual");
            document.getElementById("tab-manual").classList.toggle("text-white", tab === "manual");
            document.getElementById("tab-manual").classList.toggle("text-[#7B8194]", tab !== "manual");
            
            document.getElementById("tab-modrinth").classList.toggle("bg-[#21242E]", tab === "modrinth");
            document.getElementById("tab-modrinth").classList.toggle("text-white", tab === "modrinth");
            document.getElementById("tab-modrinth").classList.toggle("text-[#7B8194]", tab !== "modrinth");

        // Manual form submit
        function submitManualForm(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById("form-name").value.trim(),
                category: document.getElementById("form-category").value,
                version: document.getElementById("form-version").value.trim(),
                mcVersion: document.getElementById("form-mcversion").value.trim(),
                loader: document.getElementById("form-loader").value,
                link: document.getElementById("form-link").value.trim(),
                notes: document.getElementById("form-notes").value.trim()
            };
            
            if (!formData.name || !formData.link) {
                alert("Nombre y enlace son obligatorios");
                return;
            }
            
            if (editingId) {
                // Update existing
                const index = mods.findIndex(m => m.id === editingId);
                if (index !== -1) {
                    mods[index] = { ...mods[index], ...formData };
                }
            } else {
                // Add new
                mods.unshift({
                    ...formData,
                    id: crypto.randomUUID(),
                    dateAdded: new Date().toISOString()
                });
            }
            
            saveMods();
            renderModsList();
            renderCategoryChips();
            closeSheet();
        }

        // Live search Modrinth (automatic while typing)
        function setupModrinthLiveSearch() {
            const input = document.getElementById("mr-query");
            if (!input) return;

            const debouncedSearch = debounce(async () => {
                const query = input.value.trim();
                if (!query || query.length < 2) {
                    document.getElementById("mr-results").innerHTML = "";
                    return;
                }
                await performModrinthSearch(query);
            }, 450);

            input.addEventListener("input", debouncedSearch);
            input.addEventListener("focus", () => {
                if (input.value.trim().length >= 2) {
                    debouncedSearch();
                }
            });
        }

        async function performModrinthSearch(query) {
            const resultsContainer = document.getElementById("mr-results");
            const errorEl = document.getElementById("mr-error");
            
            resultsContainer.innerHTML = `<div class="text-center py-4 text-sm text-[#5D6373]">Buscando en Modrinth...</div>`;
            errorEl.classList.add("hidden");
            
            try {
                const facets = encodeURIComponent(JSON.stringify([["project_type:mod"]]));
                const res = await fetch(`https://api.modrinth.com/v2/search?query=${encodeURIComponent(query)}&facets=${facets}&limit=10`);
                
                if (!res.ok) throw new Error("Error en la API");
                
                const data = await res.json();
                renderModrinthResults(data.hits || []);
                
            } catch (err) {
                errorEl.textContent = "No se pudo conectar con Modrinth.";
                errorEl.classList.remove("hidden");
                resultsContainer.innerHTML = "";
            }
        }

            container.innerHTML = "";
            
            if (hits.length === 0) {
                container.innerHTML = `<p class="text-sm text-center text-[#5D6373] py-4">No se encontraron resultados.</p>`;
                return;
            }
            
            hits.forEach(hit => {
                const div = document.createElement("div");
                div.className = "flex gap-3 bg-[#171923] border border-[#21242E] rounded-2xl p-3 items-center";
                
                div.innerHTML = `

                            `<img src="${hit.icon_url}" class="w-full h-full object-cover">` : 
                            `<div class="w-full h-full bg-[#21242E] flex items-center justify-center"><i class="fa-solid fa-box text-[#5D6373]"></i></div>`
                        }
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-sm truncate">${hit.title}</p>
                        <p class="text-xs text-[#7B8194] line-clamp-1">${hit.description || ""}</p>
                    </div>

        function addSelectedVersion(hit, version, downloadUrl) {
            // Check for required dependencies
            const requiredDeps = (version.dependencies || []).filter(d => d.dependency_type === "required");
            
            if (requiredDeps.length === 0) {
                // No dependencies, add directly
                addModDirectly(hit, version, downloadUrl);
                return;
            }
            
            // Show dependency confirmation screen
            showDependencyConfirmation(hit, version, downloadUrl, requiredDeps);
        }

        async function showDependencyConfirmation(hit, version, downloadUrl, requiredDeps) {
            const resultsContainer = document.getElementById("mr-results");

                <div class="mb-4">
                    <p class="font-semibold text-lg">${hit.title}</p>

                </div>

            `;

            // Fetch project info for each dependency

        function addModDirectly(hit, version, downloadUrl) {
            const newMod = {
                id: crypto.randomUUID(),
                name: hit.title,
                category: "otros",
                version: version.version_number || "",
                mcVersion: (version.game_versions && version.game_versions[0]) || "",
                loader: (version.loaders && version.loaders[0]) || "Fabric",
                link: downloadUrl,
                notes: hit.description || "",
                dateAdded: new Date().toISOString()
            };
            
            mods.unshift(newMod);
            saveMods();
            renderModsList();
            renderCategoryChips();
            closeSheet();
            currentModrinthHit = null;
        }

        async function addModWithDependencies(hit, version, downloadUrl, depDetails) {
            const mainLoader = (version.loaders && version.loaders[0]) || "Fabric";
            const mainMcVersion = (version.game_versions && version.game_versions[0]) || "";

            // Add main mod first
            const mainMod = {
                id: crypto.randomUUID(),
                name: hit.title,
                category: "otros",
                version: version.version_number || "",
                mcVersion: mainMcVersion,
                loader: mainLoader,
                link: downloadUrl,
                notes: hit.description || `Incluye ${depDetails.length} dependencias`,
                dateAdded: new Date().toISOString()
            };
            
            mods.unshift(mainMod);
            
            // Add dependencies with correct compatible version
            for (const dep of depDetails) {
                const alreadyExists = mods.some(m => m.name.toLowerCase() === dep.name.toLowerCase());
                if (alreadyExists) continue;

                let depVersion = "";
                let depMcVersion = mainMcVersion;
                let depLoader = mainLoader;
                let depLink = dep.slug ? `https://modrinth.com/mod/${dep.slug}` : "";

                try {
                    // Fetch all versions of this dependency
                    const res = await fetch(`https://api.modrinth.com/v2/project/${dep.project_id}/version`);
                    if (res.ok) {
                        const versions = await res.json();

                        // Find the best matching version
                        const compatible = versions.filter(v => {
                            const supportsLoader = v.loaders && v.loaders.includes(mainLoader);
                            const supportsMc = !mainMcVersion || (v.game_versions && v.game_versions.includes(mainMcVersion));
                            return supportsLoader && supportsMc;
                        });

                        if (compatible.length > 0) {
                            // Sort by date published (newest first)
                            compatible.sort((a, b) => new Date(b.date_published) - new Date(a.date_published));
                            const best = compatible[0];

                            depVersion = best.version_number || "";
                            depMcVersion = (best.game_versions && best.game_versions[0]) || mainMcVersion;
                            depLoader = (best.loaders && best.loaders[0]) || mainLoader;

                            const primaryFile = best.files.find(f => f.primary) || best.files[0];
                            if (primaryFile) {
                                depLink = primaryFile.url;
                            }
                        }
                    }
                } catch (e) {
                    // If something fails, keep the basic link
                }

                mods.unshift({
                    id: crypto.randomUUID(),
                    name: dep.name,
                    category: "librerias",
                    version: depVersion,
                    mcVersion: depMcVersion,
                    loader: depLoader,
                    link: depLink,
                    notes: "Dependencia añadida automáticamente",
                    dateAdded: new Date().toISOString()
                });
            }
            
            saveMods();
            renderModsList();
            renderCategoryChips();
            closeSheet();
            currentModrinthHit = null;
        }

        // === Export as TXT ===
        function exportAsTxt() {
            if (mods.length === 0) {
                alert("No tienes mods para exportar.");
                return;
            }

            const modpackName = document.getElementById("modpack-name")?.value.trim() || "Mi Modpack";
            const date = new Date().toLocaleDateString('es-ES');

            let content = `${modpackName}\n`;
            content += `Exportado: ${date}\n`;
            content += `Total de mods: ${mods.length}\n`;
            content += "================================\n\n";

            mods.forEach((mod, index) => {
                const cat = getCategoryInfo(mod.category);
                content += `${index + 1}. ${mod.name}\n`;
                if (mod.version) content += `   Versión: ${mod.version}\n`;
                if (mod.mcVersion) content += `   Minecraft: ${mod.mcVersion}\n`;
                if (mod.loader) content += `   Loader: ${mod.loader}\n`;
                if (mod.link) content += `   Enlace: ${mod.link}\n`;
                if (mod.notes) content += `   Notas: ${mod.notes}\n`;
                content += "\n";
            });

            // Create and download file
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${modpackName.replace(/[^a-z0-9]/gi, '_')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // === Export as ZIP with .jar files ===
        async function exportAsZip() {
            if (mods.length === 0) {
                alert("No tienes mods para exportar.");
                return;
            }

            const zip = new JSZip();
            const modpackName = document.getElementById("modpack-name")?.value.trim() || "Mi Modpack";
            let addedFiles = 0;
            let failedMods = [];

            // Show loading state
            const originalText = event.currentTarget?.innerHTML || "";
            
            for (const mod of mods) {
                if (!mod.link) {
                    failedMods.push(mod.name + " (sin enlace)");
                    continue;
                }

                // Try to get a direct .jar download link
                let downloadUrl = mod.link;

                // If it's a Modrinth project page, try to improve it (basic heuristic)
                if (downloadUrl.includes("modrinth.com/mod/") && !downloadUrl.includes("/version/")) {
                    // We can't easily get the latest direct jar without more API calls
                    // For now, we'll skip non-direct links or notify
                    failedMods.push(mod.name + " (enlace de proyecto, no .jar directo)");
                    continue;
                }

                try {
                    const response = await fetch(downloadUrl, { mode: 'cors' });
                    if (!response.ok) throw new Error("No se pudo descargar");

                    const blob = await response.blob();
                    
                    // Default fallback filename (mod name based)
                    let filename = mod.name.replace(/[^a-z0-9]/gi, '_') + ".jar";

                    // Prefer the original filename as it appears in the download URL itself
                    try {
                        const urlPath = new URL(downloadUrl).pathname;
                        const lastSegment = decodeURIComponent(urlPath.split('/').filter(Boolean).pop() || "");
                        if (lastSegment && lastSegment.toLowerCase().endsWith(".jar")) {
                            filename = lastSegment;
                        }
                    } catch (e) {
                        // Ignore malformed URL, keep fallback
                    }
                    
                    // If the response has a filename in headers, that's the most authoritative source
                    const contentDisposition = response.headers.get("content-disposition");
                    if (contentDisposition) {
                        const match = contentDisposition.match(/filename\*?=(?:UTF-8'')?"?([^";]+)"?/i);
                        if (match) filename = decodeURIComponent(match[1]);
                    }

                    // Avoid collisions if two mods resolve to the same original filename
                    if (zip.file(filename)) {
                        const dotIndex = filename.lastIndexOf(".");
                        const base = dotIndex !== -1 ? filename.slice(0, dotIndex) : filename;
                        const ext = dotIndex !== -1 ? filename.slice(dotIndex) : "";
                        filename = `${base}_${mod.id || Date.now()}${ext}`;
                    }

                    zip.file(filename, blob);
                    addedFiles++;

                } catch (err) {
                    failedMods.push(mod.name);
                }
            }

            if (addedFiles === 0) {
                alert("No se pudieron descargar los archivos .jar.\n\nLa mayoría de enlaces en la lista son páginas de proyecto y no enlaces directos a los archivos.\n\nConsejo: Añade los mods usando la búsqueda de Modrinth para que se guarden los enlaces directos.");
                return;
            }

            // Generate and download the ZIP
            const zipBlob = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${modpackName.replace(/[^a-z0-9]/gi, '_')}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // Show result
            let message = `Se descargaron ${addedFiles} mods en el ZIP.`;
            if (failedMods.length > 0) {
                message += `\n\nNo se pudieron incluir: ${failedMods.length} mods (normalmente porque el enlace no es directo al .jar).`;
            }
            alert(message);
        }
